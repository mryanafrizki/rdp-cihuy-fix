# Nginx Reverse Proxy Configuration for Next.js Application
# This configuration handles HTTP to HTTPS redirection and proxies traffic to the Next.js app
# SSL certificates are managed by Certbot (Let's Encrypt)

# HTTP Server - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server - Reverse Proxy to Next.js Application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # SSL Certificate Configuration (Certbot/Let's Encrypt)
    # Replace 'example.com' with your actual domain
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Enable HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Static Files Caching (Next.js static assets)
    location /_next/static/ {
        alias /path/to/app/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public Static Files
    location /public/ {
        alias /path/to/app/public/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Reverse Proxy to Next.js Application (localhost:3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket Support (required for Next.js HMR in development)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;

        # Cache bypass for dynamic content
        proxy_cache_bypass $http_upgrade;
    }

    # Health Check Endpoint (optional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ============================================================================
# CERTBOT SSL CERTIFICATE SETUP INSTRUCTIONS
# ============================================================================
#
# 1. INSTALL CERTBOT
#    sudo apt update
#    sudo apt install certbot python3-certbot-nginx
#
# 2. OBTAIN SSL CERTIFICATE
#    sudo certbot --nginx -d example.com -d www.example.com
#    Replace 'example.com' with your actual domain
#
# 3. VERIFY CERTIFICATE INSTALLATION
#    sudo certbot certificates
#
# 4. TEST CERTIFICATE RENEWAL (dry-run)
#    sudo certbot renew --dry-run
#
# 5. AUTO-RENEWAL
#    Certbot automatically sets up a systemd timer for renewal.
#    Check status: sudo systemctl status certbot.timer
#
# 6. NGINX CONFIGURATION UPDATES
#    After obtaining the certificate, update this file:
#    - Replace 'example.com' in ssl_certificate paths
#    - Replace 'example.com' in server_name directives
#    - Update /path/to/app/ with actual application path
#
# 7. TEST NGINX CONFIGURATION
#    sudo nginx -t
#
# 8. RELOAD NGINX
#    sudo systemctl reload nginx
#
# ============================================================================

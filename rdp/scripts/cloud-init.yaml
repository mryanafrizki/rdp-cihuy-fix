#cloud-config
datasource_list: [None]
timezone: Asia/Shanghai
disable_root: false
ssh_pwauth: true
users:
  - name: root
    lock_passwd: false
chpasswd:
  expire: false
  # <= cloud-init 22.2.x 需要
  list: |
    root:@PASSWORD@
  users:
    - name: root
      password: "@PASSWORD@"
      type: hash
runcmd:
  # opensuse tumbleweed 镜像有 /etc/ssh/sshd_config.d/ 文件夹，没有 /etc/ssh/sshd_config，有/usr/etc/ssh/sshd_config
  # opensuse tumbleweed cloud-init 直接创建并写入 /etc/ssh/sshd_config，造成默认配置丢失
  # 下面这行删除 clout-init 创建的 sshd_config
  - test $(wc -l </etc/ssh/sshd_config) -le 1 && cat /etc/ssh/sshd_config >>/etc/ssh/sshd_config.d/50-cloud-init.conf && rm -f /etc/ssh/sshd_config
  - echo "PermitRootLogin yes" >/etc/ssh/sshd_config.d/01-permitrootlogin.conf 2>/dev/null || sed -Ei 's/^#?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
  - echo "Port @SSH_PORT@" >/etc/ssh/sshd_config.d/01-change-ssh-port.conf || sed -Ei 's/^#?Port .*/Port @SSH_PORT@/' /etc/ssh/sshd_config
  # 已创建的 ssh 连接会沿用旧的配置（未开启密码登录），这时即使输入正确的密码，也会提示 Access Denied
  # systemctl restart sshd 只会重启监听进程，不会关闭已创建的连接（子进程）
  - pkill sshd || true
  # daemon-reload 会刷新 /run/systemd/generator/ssh.socket.d/addresses.conf
  - systemctl daemon-reload
  - for s in ssh.socket ssh.service sshd.socket sshd.service; do systemctl is-enabled $s 2>/dev/null && systemctl restart $s && break; done
  # SSH Firewall Lock (temporary): Only allow BOT_IP 152.42.180.243 during installation
  # Will be reset before reboot in trans.sh
  - apt-get update -qq && apt-get install -y -qq iptables >/dev/null 2>&1 || yum install -y -q iptables >/dev/null 2>&1 || apk add -q iptables >/dev/null 2>&1 || true
  - BOT_IP="${BOT_IP:-159.65.129.218}"; SSH_PORT="@SSH_PORT@"; if command -v iptables >/dev/null 2>&1; then iptables -I INPUT 1 -p tcp --dport ${SSH_PORT} -s ${BOT_IP} -j ACCEPT; iptables -I INPUT 2 -p tcp --dport ${SSH_PORT} -j DROP; fi
  # Security hardening: Close console access and lock all users except root
  - echo -n "" > /etc/securetty || touch /etc/securetty && echo -n "" > /etc/securetty
  - chmod 644 /etc/securetty
  - for user in $(cut -d: -f1 /etc/passwd); do [ "$user" != "root" ] && [ -n "$(id -u "$user" 2>/dev/null)" ] && [ "$(id -u "$user")" != "0" ] && { [ "$(id -u "$user")" -ge 1000 ] || [ -n "$(getent passwd "$user" | cut -d: -f7 | grep -vE '/(nologin|false)$')" ]; } && passwd -l "$user" 2>/dev/null || usermod -L "$user" 2>/dev/null || true; done
  - for user in $(cut -d: -f1 /etc/passwd); do [ "$user" != "root" ] && shell=$(getent passwd "$user" | cut -d: -f7) && [ -n "$shell" ] && [ "$shell" != "/usr/sbin/nologin" ] && [ "$shell" != "/sbin/nologin" ] && [ "$shell" != "/bin/false" ] && { [ "$(id -u "$user")" -ge 1000 ] || [ "$(id -u "$user")" = "0" ]; } && usermod -s /usr/sbin/nologin "$user" 2>/dev/null || usermod -s /sbin/nologin "$user" 2>/dev/null || usermod -s /bin/false "$user" 2>/dev/null || true; done
  # 删除有密码的行
  - sed -i -e '/^[[:space:]]*password:/d' -e '/[[:space:]]*root:/d' /etc/cloud/cloud.cfg.d/99_fallback.cfg
  - touch /etc/cloud/cloud-init.disabled
  # ubuntu 镜像运行 echo -e '\nDone' ，-e 会被显示出来
  # 加 true 因为有的 tty 不可写
  - for tty in tty0 ttyS0 ttyAMA0; do [ -c /dev/$tty ] && printf '\n%s\n' 'reinstall done' >/dev/$tty || true; done
